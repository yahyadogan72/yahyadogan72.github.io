<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Yahya Doğan — Doç. Dr. | Bilgisayar Mühendisliği</title>
<meta name="description" content="Doç. Dr. Yahya Doğan — Siirt Üniversitesi Bilgisayar Mühendisliği. Derin öğrenme, bilgisayarlı görü ve tıbbi görüntü analizi araştırmaları.">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,500;9..144,600;9..144,700&family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root{
    --ink:#12203a;
    --ink-soft:#33405c;
    --paper:#f7f5f0;
    --paper-2:#efece4;
    --card:#ffffff;
    --amber:#c8791f;
    --amber-soft:#e8a94b;
    --line:#e2ddd2;
    --muted:#6b7385;
    --max:1080px;
    --radius:14px;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  html{scroll-behavior:smooth}
  body{
    font-family:'Inter',system-ui,sans-serif;
    background:var(--paper);
    color:var(--ink);
    line-height:1.6;
    -webkit-font-smoothing:antialiased;
  }
  a{color:inherit;text-decoration:none}
  .wrap{max-width:var(--max);margin:0 auto;padding:0 24px}

  /* ---------- Top bar ---------- */
  header.nav{
    position:sticky;top:0;z-index:50;
    background:rgba(247,245,240,.85);
    backdrop-filter:blur(12px);
    border-bottom:1px solid var(--line);
  }
  .nav-inner{display:flex;align-items:center;justify-content:space-between;height:62px}
  .brand{font-family:'Fraunces',serif;font-weight:600;font-size:1.15rem;letter-spacing:-.01em}
  .brand .dot{color:var(--amber)}
  .nav-links{display:flex;gap:26px;align-items:center}
  .nav-links a{font-size:.9rem;color:var(--ink-soft);font-weight:500;transition:color .2s}
  .nav-links a:hover{color:var(--amber)}
  .lang-toggle{
    display:flex;border:1px solid var(--line);border-radius:999px;overflow:hidden;
    font-size:.78rem;font-weight:600;
  }
  .lang-toggle button{
    border:0;background:transparent;padding:6px 12px;cursor:pointer;color:var(--muted);
    font-weight:600;transition:all .2s;font-family:inherit;
  }
  .lang-toggle button.active{background:var(--ink);color:#fff}
  .nav-toggle{display:none;background:none;border:0;cursor:pointer;padding:8px}
  .nav-toggle span{display:block;width:22px;height:2px;background:var(--ink);margin:4px 0;transition:.3s}

  /* ---------- Hero ---------- */
  .hero{padding:70px 0 50px;position:relative;overflow:hidden}
  .hero-grid{display:grid;grid-template-columns:1fr 220px;gap:48px;align-items:center}
  .eyebrow{
    font-family:'JetBrains Mono',monospace;font-size:.72rem;letter-spacing:.18em;
    text-transform:uppercase;color:var(--amber);font-weight:500;margin-bottom:18px;
  }
  .hero h1{
    font-family:'Fraunces',serif;font-weight:600;font-size:clamp(2.4rem,6vw,4rem);
    line-height:1.02;letter-spacing:-.02em;margin-bottom:8px;
  }
  .hero .role{
    font-size:1.15rem;color:var(--ink-soft);font-weight:500;margin-bottom:20px;
  }
  .hero .dept{color:var(--muted);font-size:.98rem;max-width:36ch;margin-bottom:26px}
  .hero-contact{display:flex;flex-wrap:wrap;gap:10px}
  .chip{
    display:inline-flex;align-items:center;gap:7px;background:var(--card);
    border:1px solid var(--line);border-radius:999px;padding:8px 16px;font-size:.86rem;
    color:var(--ink-soft);font-weight:500;transition:all .2s;
  }
  .chip:hover{border-color:var(--amber-soft);color:var(--amber)}
  .chip svg{width:15px;height:15px;flex-shrink:0}
  .portrait{
    position:relative;
  }
  .portrait img{
    width:100%;aspect-ratio:3/3.6;object-fit:cover;border-radius:var(--radius);
    filter:grayscale(.15);border:1px solid var(--line);
    box-shadow:0 18px 40px -18px rgba(18,32,58,.4);
  }
  .portrait::after{
    content:"";position:absolute;inset:0;border-radius:var(--radius);
    background:linear-gradient(160deg,transparent 60%,rgba(200,121,31,.12));
    pointer-events:none;
  }

  /* ---------- Stats strip ---------- */
  .stats{
    display:grid;grid-template-columns:repeat(4,1fr);gap:1px;background:var(--line);
    border:1px solid var(--line);border-radius:var(--radius);overflow:hidden;margin-top:8px;
  }
  .stat{background:var(--paper);padding:22px 20px;text-align:center}
  .stat .num{font-family:'Fraunces',serif;font-size:2rem;font-weight:600;color:var(--ink);line-height:1}
  .stat .lbl{font-size:.76rem;color:var(--muted);margin-top:6px;font-weight:500;letter-spacing:.02em}

  /* ---------- Sections ---------- */
  section.block{padding:54px 0;border-top:1px solid var(--line)}
  .sec-head{display:flex;align-items:baseline;gap:14px;margin-bottom:30px}
  .sec-num{font-family:'JetBrains Mono',monospace;font-size:.8rem;color:var(--amber);font-weight:500}
  .sec-title{font-family:'Fraunces',serif;font-size:1.7rem;font-weight:600;letter-spacing:-.01em}

  /* Timeline (education / positions) */
  .tl{position:relative;padding-left:26px}
  .tl::before{content:"";position:absolute;left:6px;top:6px;bottom:6px;width:2px;background:var(--line)}
  .tl-item{position:relative;padding-bottom:26px}
  .tl-item:last-child{padding-bottom:0}
  .tl-item::before{
    content:"";position:absolute;left:-26px;top:5px;width:12px;height:12px;border-radius:50%;
    background:var(--paper);border:2px solid var(--amber);
  }
  .tl-item .yr{font-family:'JetBrains Mono',monospace;font-size:.78rem;color:var(--muted);font-weight:500}
  .tl-item h4{font-size:1.02rem;font-weight:600;margin:2px 0}
  .tl-item .inst{color:var(--ink-soft);font-size:.92rem}
  .tl-item .thesis{color:var(--muted);font-size:.85rem;margin-top:5px;font-style:italic}

  /* Two-column grid cards */
  .grid2{display:grid;grid-template-columns:1fr 1fr;gap:16px}
  .mini{background:var(--card);border:1px solid var(--line);border-radius:12px;padding:18px 20px}
  .mini .yr{font-family:'JetBrains Mono',monospace;font-size:.74rem;color:var(--amber);font-weight:500}
  .mini h4{font-size:.98rem;font-weight:600;margin:3px 0}
  .mini .inst{color:var(--muted);font-size:.86rem}

  /* Publications */
  .pub-controls{display:flex;flex-wrap:wrap;gap:8px;margin-bottom:24px;align-items:center}
  .filter-btn{
    border:1px solid var(--line);background:var(--card);border-radius:999px;padding:7px 15px;
    font-size:.82rem;font-weight:500;color:var(--ink-soft);cursor:pointer;font-family:inherit;transition:all .2s;
  }
  .filter-btn:hover{border-color:var(--amber-soft)}
  .filter-btn.active{background:var(--ink);color:#fff;border-color:var(--ink)}
  .pub-count{margin-left:auto;font-size:.8rem;color:var(--muted);font-family:'JetBrains Mono',monospace}
  .pub-group{margin-bottom:30px}
  .pub-group-title{
    font-family:'JetBrains Mono',monospace;font-size:.76rem;letter-spacing:.1em;text-transform:uppercase;
    color:var(--muted);font-weight:500;margin-bottom:12px;padding-bottom:8px;border-bottom:1px solid var(--line);
  }
  .pub{
    display:grid;grid-template-columns:52px 1fr;gap:16px;padding:14px 0;border-bottom:1px solid var(--paper-2);
    align-items:start;
  }
  .pub:last-child{border-bottom:0}
  .pub .pyr{
    font-family:'JetBrains Mono',monospace;font-size:.82rem;color:var(--amber);font-weight:600;
    padding-top:2px;
  }
  .pub .ptitle{font-size:.98rem;font-weight:600;line-height:1.4;color:var(--ink)}
  .pub .pauthors{font-size:.86rem;color:var(--ink-soft);margin-top:3px}
  .pub .pvenue{font-size:.84rem;color:var(--muted);margin-top:2px;font-style:italic}
  .pub .pdoi{
    display:inline-flex;align-items:center;gap:5px;font-family:'JetBrains Mono',monospace;
    font-size:.74rem;color:var(--amber);margin-top:5px;font-weight:500;
  }
  .pub .pdoi:hover{text-decoration:underline}

  /* Awards / tags */
  .award-row{display:flex;align-items:center;gap:14px;padding:12px 0;border-bottom:1px solid var(--paper-2)}
  .award-row:last-child{border-bottom:0}
  .award-medal{width:38px;height:38px;border-radius:50%;background:var(--paper-2);display:flex;align-items:center;justify-content:center;flex-shrink:0}
  .award-medal svg{width:20px;height:20px;color:var(--amber)}
  .award-row .aw-t{font-weight:600;font-size:.98rem}
  .award-row .aw-m{color:var(--muted);font-size:.85rem}
  .tags{display:flex;flex-wrap:wrap;gap:8px}
  .tag{background:var(--card);border:1px solid var(--line);border-radius:8px;padding:8px 14px;font-size:.88rem;font-weight:500;color:var(--ink-soft)}
  .course-cols{display:grid;grid-template-columns:1fr 1fr;gap:30px}
  .course-cols h5{font-family:'JetBrains Mono',monospace;font-size:.74rem;letter-spacing:.1em;text-transform:uppercase;color:var(--amber);margin-bottom:12px;font-weight:500}

  /* Footer */
  footer{padding:40px 0;border-top:1px solid var(--line);text-align:center;color:var(--muted);font-size:.85rem}
  footer a{color:var(--amber);font-weight:500}
  .admin-link{font-family:'JetBrains Mono',monospace;font-size:.72rem;opacity:.5}

  /* Loading */
  #loading{text-align:center;padding:100px 20px;color:var(--muted)}

  /* Focus visibility & reduced motion */
  a:focus-visible,button:focus-visible{outline:2px solid var(--amber);outline-offset:2px;border-radius:6px}
  @media(prefers-reduced-motion:reduce){
    *{animation-duration:.001ms!important;transition-duration:.001ms!important;scroll-behavior:auto!important}
  }

  @media(max-width:820px){
    .hero-grid{grid-template-columns:1fr;gap:32px}
    .portrait{max-width:200px}
    .stats{grid-template-columns:repeat(2,1fr)}
    .grid2{grid-template-columns:1fr}
    .course-cols{grid-template-columns:1fr;gap:24px}
    .nav-links{display:none;position:absolute;top:62px;left:0;right:0;flex-direction:column;background:var(--paper);padding:20px 24px;gap:16px;border-bottom:1px solid var(--line)}
    .nav-links.open{display:flex}
    .nav-links .lang-toggle{align-self:flex-start}
    .nav-toggle{display:block}
    .pub{grid-template-columns:44px 1fr;gap:12px}
  }
</style>
</head>
<body>

<header class="nav">
  <div class="wrap nav-inner">
    <a href="#" class="brand">YD<span class="dot">.</span></a>
    <nav class="nav-links" id="navLinks">
      <a href="#about" data-tr="Hakkında" data-en="About">Hakkında</a>
      <a href="#education" data-tr="Eğitim" data-en="Education">Eğitim</a>
      <a href="#publications" data-tr="Yayınlar" data-en="Publications">Yayınlar</a>
      <a href="#projects" data-tr="Projeler" data-en="Projects">Projeler</a>
      <a href="#teaching" data-tr="Öğretim" data-en="Teaching">Öğretim</a>
      <div class="lang-toggle">
        <button id="btn-tr" class="active" onclick="setLang('tr')">TR</button>
        <button id="btn-en" onclick="setLang('en')">EN</button>
      </div>
    </nav>
    <button class="nav-toggle" id="navToggle" aria-label="Menu"><span></span><span></span><span></span></button>
  </div>
</header>

<div id="loading">Yükleniyor…</div>
<main id="app" style="display:none"></main>

<footer>
  <div class="wrap">
    <p>© <span id="year"></span> Yahya Doğan · <span data-tr="Tüm hakları saklıdır" data-en="All rights reserved">Tüm hakları saklıdır</span></p>
    <p style="margin-top:8px"><a href="admin.html" class="admin-link">yönetim</a></p>
  </div>
</footer>

<script>
let DATA=null, LANG='tr';

/* Profil fotoğrafı (assets/profile.jpg) bulunamazsa gösterilen yer tutucu. */
const PLACEHOLDER_IMG="data:image/svg+xml;utf8,"+encodeURIComponent(
  `<svg xmlns='http://www.w3.org/2000/svg' width='300' height='360' viewBox='0 0 300 360'>
    <rect width='300' height='360' fill='#efece4'/>
    <text x='150' y='150' font-family='Georgia,serif' font-size='120' font-weight='600' fill='#c8791f' text-anchor='middle' dominant-baseline='central'>YD</text>
    <text x='150' y='250' font-family='Arial,sans-serif' font-size='18' fill='#6b7385' text-anchor='middle'>Fotoğraf ekleyin</text>
  </svg>`);

const T={
  tr:{about:'Hakkında',education:'Eğitim',positions:'Akademik Görevler',admin:'İdari Görevler',
    publications:'Yayınlar',journals_intl:'Uluslararası Hakemli Dergiler',journals_natl:'Ulusal Hakemli Dergiler',
    conferences_intl:'Uluslararası Bildiriler',conferences_natl:'Ulusal Bildiriler',book_chapters:'Kitap Bölümleri',
    projects:'Projeler',theses:'Yönetilen Tezler',awards:'Ödüller',teaching:'Verdiği Dersler',
    undergrad:'Lisans',grad:'Yüksek Lisans',all:'Tümü',role:'Görev',funder:'Destekleyen',
    s_pub:'Yayın',s_proj:'Proje',s_thesis:'Tez',s_cite:'Yıl Deneyim',stat_exp:'Yıl'},
  en:{about:'About',education:'Education',positions:'Academic Positions',admin:'Administrative Roles',
    publications:'Publications',journals_intl:'International Journals',journals_natl:'National Journals',
    conferences_intl:'International Conferences',conferences_natl:'National Conferences',book_chapters:'Book Chapters',
    projects:'Projects',theses:'Supervised Theses',awards:'Awards',teaching:'Courses Taught',
    undergrad:'Undergraduate',grad:'Graduate',all:'All',role:'Role',funder:'Funder',
    s_pub:'Publications',s_proj:'Projects',s_thesis:'Theses',s_cite:'Years',stat_exp:'Years'}
};

function loc(v){ if(v==null) return ''; if(typeof v==='object') return v[LANG]||v.tr||v.en||''; return v; }
function esc(s){return String(s).replace(/[&<>"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]));}

async function load(){
  try{
    const r=await fetch('data.json?v='+Date.now());
    DATA=await r.json();
    render();
    document.getElementById('loading').style.display='none';
    document.getElementById('app').style.display='block';
  }catch(e){
    document.getElementById('loading').innerHTML='Veri yüklenemedi / Could not load data.<br><small>'+esc(e.message)+'</small>';
  }
}

function render(){
  const t=T[LANG], p=DATA.profile, pub=DATA.publications;
  const pubTotal=Object.values(pub).reduce((a,x)=>a+x.length,0);
  let h='';

  /* HERO */
  h+=`<section class="hero"><div class="wrap"><div class="hero-grid">
    <div>
      <div class="eyebrow">${esc(loc(p.title))} · Computer Engineering</div>
      <h1>${esc(p.name)}</h1>
      <div class="role">${esc(loc(p.title))}</div>
      <div class="dept">${esc(loc(p.department))}</div>
      <div class="hero-contact">
        <a class="chip" href="mailto:${esc(p.email)}">${icon('mail')} ${esc(p.email)}</a>
        <span class="chip">${icon('phone')} ${esc(p.phone)}</span>
        ${p.links&&p.links.scholar?`<a class="chip" href="${esc(p.links.scholar)}" target="_blank" rel="noopener">${icon('link')} Scholar</a>`:''}
        ${p.links&&p.links.orcid?`<a class="chip" href="${esc(p.links.orcid)}" target="_blank" rel="noopener">${icon('link')} ORCID</a>`:''}
        ${p.links&&p.links.researchgate?`<a class="chip" href="${esc(p.links.researchgate)}" target="_blank" rel="noopener">${icon('link')} ResearchGate</a>`:''}
        ${p.links&&p.links.linkedin?`<a class="chip" href="${esc(p.links.linkedin)}" target="_blank" rel="noopener">${icon('link')} LinkedIn</a>`:''}
        ${p.links&&p.links.github?`<a class="chip" href="${esc(p.links.github)}" target="_blank" rel="noopener">${icon('link')} GitHub</a>`:''}
      </div>
    </div>
    <div class="portrait"><img src="${esc(p.photo)}" alt="${esc(p.name)}" onerror="this.onerror=null;this.src=PLACEHOLDER_IMG"></div>
  </div>
  <div class="stats">
    <div class="stat"><div class="num">${pubTotal}</div><div class="lbl">${t.s_pub}</div></div>
    <div class="stat"><div class="num">${DATA.projects.length}</div><div class="lbl">${t.s_proj}</div></div>
    <div class="stat"><div class="num">${DATA.supervised_theses.length}</div><div class="lbl">${t.s_thesis}</div></div>
    <div class="stat"><div class="num">13+</div><div class="lbl">${t.stat_exp}</div></div>
  </div></div></section>`;

  /* ABOUT */
  h+=sec('01','about',t.about)+`<div class="wrap"><p style="font-size:1.1rem;color:var(--ink-soft);max-width:60ch">${esc(loc(p.bio))}</p></div></section>`;

  /* EDUCATION + POSITIONS */
  h+=sec('02','education',t.education)+`<div class="wrap"><div class="tl">`;
  DATA.education.forEach(e=>{
    h+=`<div class="tl-item"><div class="yr">${esc(e.years)}</div>
      <h4>${esc(loc(e.degree))}</h4><div class="inst">${esc(e.institution)}</div>
      ${loc(e.thesis)?`<div class="thesis">${esc(loc(e.thesis))}</div>`:''}</div>`;
  });
  h+=`</div>
    <h3 style="font-family:Fraunces,serif;font-size:1.25rem;margin:36px 0 20px">${t.positions}</h3><div class="tl">`;
  DATA.positions.forEach(e=>{
    h+=`<div class="tl-item"><div class="yr">${esc(e.years)}</div>
      <h4>${esc(loc(e.role))}</h4><div class="inst">${esc(e.institution)}</div></div>`;
  });
  h+=`</div>
    <h3 style="font-family:Fraunces,serif;font-size:1.25rem;margin:36px 0 20px">${t.admin}</h3><div class="grid2">`;
  DATA.administrative.forEach(e=>{
    h+=`<div class="mini"><div class="yr">${esc(e.years)}</div><h4>${esc(loc(e.role))}</h4><div class="inst">${esc(e.institution)}</div></div>`;
  });
  h+=`</div></div></section>`;

  /* PUBLICATIONS */
  h+=sec('03','publications',t.publications)+`<div class="wrap">
    <div class="pub-controls" id="pubControls"></div>
    <div id="pubList"></div></div></section>`;

  /* PROJECTS */
  h+=sec('04','projects',t.projects)+`<div class="wrap"><div class="grid2">`;
  DATA.projects.forEach(pr=>{
    h+=`<div class="mini"><div class="yr">${esc(pr.years)}</div><h4>${esc(pr.title)}</h4>
      <div class="inst">${esc(loc(pr.role))} · ${esc(loc(pr.funder))}</div></div>`;
  });
  h+=`</div>
    <h3 style="font-family:Fraunces,serif;font-size:1.25rem;margin:40px 0 20px">${t.theses}</h3><div class="tl">`;
  DATA.supervised_theses.forEach(th=>{
    h+=`<div class="tl-item"><div class="yr">${esc(th.year)} · ${esc(loc(th.status))}</div>
      <h4 style="font-weight:600;font-size:.96rem">${esc(th.title)}</h4><div class="inst">${esc(th.student)}</div></div>`;
  });
  h+=`</div></div></section>`;

  /* TEACHING + AWARDS */
  h+=sec('05','teaching',t.teaching)+`<div class="wrap"><div class="course-cols">
    <div><h5>${t.undergrad}</h5><div class="tags">`;
  DATA.courses.undergraduate.forEach(c=>h+=`<span class="tag">${esc(c)}</span>`);
  h+=`</div></div><div><h5>${t.grad}</h5><div class="tags">`;
  DATA.courses.graduate.forEach(c=>h+=`<span class="tag">${esc(c)}</span>`);
  h+=`</div></div></div>
    <h3 style="font-family:Fraunces,serif;font-size:1.25rem;margin:40px 0 16px">${t.awards}</h3><div>`;
  DATA.awards.forEach(a=>{
    h+=`<div class="award-row"><div class="award-medal">${icon('award')}</div>
      <div><div class="aw-t">${esc(loc(a.title))}</div><div class="aw-m">${esc(a.org)} · ${esc(a.year)}</div></div></div>`;
  });
  h+=`</div></div></section>`;

  document.getElementById('app').innerHTML=h;
  renderPubs('all');
  applyLangStatic();
}

function sec(num,id,title){
  return `<section class="block" id="${id}"><div class="wrap"><div class="sec-head">
    <span class="sec-num">${num}</span><h2 class="sec-title">${title}</h2></div></div>`;
}

const PUB_ORDER=['journals_intl','journals_natl','conferences_intl','conferences_natl','book_chapters'];
function renderPubs(filter){
  const t=T[LANG], pub=DATA.publications;
  const ctrl=document.getElementById('pubControls');
  let total=Object.values(pub).reduce((a,x)=>a+x.length,0);
  let cb=`<button class="filter-btn ${filter==='all'?'active':''}" onclick="renderPubs('all')">${t.all}</button>`;
  PUB_ORDER.forEach(k=>{
    if(pub[k]&&pub[k].length) cb+=`<button class="filter-btn ${filter===k?'active':''}" onclick="renderPubs('${k}')">${t[k]} (${pub[k].length})</button>`;
  });
  const shown=filter==='all'?total:pub[filter].length;
  cb+=`<span class="pub-count">${shown} / ${total}</span>`;
  ctrl.innerHTML=cb;

  const list=document.getElementById('pubList');
  let h='';
  const groups=filter==='all'?PUB_ORDER:[filter];
  groups.forEach(k=>{
    if(!pub[k]||!pub[k].length) return;
    h+=`<div class="pub-group"><div class="pub-group-title">${t[k]}</div>`;
    pub[k].slice().sort((a,b)=>(b.year||'').localeCompare(a.year||'')).forEach(x=>{
      h+=`<div class="pub"><div class="pyr">${esc(x.year||'')}</div><div>
        <div class="ptitle">${esc(x.title)}</div>
        <div class="pauthors">${esc(x.authors)}</div>
        <div class="pvenue">${esc(x.venue)}</div>
        ${x.doi?`<a class="pdoi" href="https://doi.org/${esc(x.doi)}" target="_blank" rel="noopener">${icon('link')} doi.org/${esc(x.doi)}</a>`:''}
      </div></div>`;
    });
    h+=`</div>`;
  });
  list.innerHTML=h;
}

function icon(n){
  const i={
    mail:'<path d="M2 4h12v8H2z" fill="none" stroke="currentColor" stroke-width="1.3"/><path d="M2 4l6 5 6-5" fill="none" stroke="currentColor" stroke-width="1.3"/>',
    phone:'<path d="M3 3h3l1 4-2 1a8 8 0 004 4l1-2 4 1v3a1 1 0 01-1 1A11 11 0 013 4a1 1 0 010-1z" fill="none" stroke="currentColor" stroke-width="1.3"/>',
    link:'<path d="M6 10a3 3 0 004 0l2-2a3 3 0 00-4-4l-1 1M10 6a3 3 0 00-4 0L4 8a3 3 0 004 4l1-1" fill="none" stroke="currentColor" stroke-width="1.3"/>',
    award:'<circle cx="8" cy="6" r="4" fill="none" stroke="currentColor" stroke-width="1.3"/><path d="M6 9l-1 5 3-2 3 2-1-5" fill="none" stroke="currentColor" stroke-width="1.3"/>'
  };
  return `<svg viewBox="0 0 16 16" fill="none" aria-hidden="true">${i[n]||''}</svg>`;
}

function setLang(l){
  LANG=l;
  document.documentElement.lang=l;
  document.getElementById('btn-tr').classList.toggle('active',l==='tr');
  document.getElementById('btn-en').classList.toggle('active',l==='en');
  if(DATA) render();
}
function applyLangStatic(){
  document.querySelectorAll('[data-tr]').forEach(el=>{el.textContent=el.getAttribute('data-'+LANG);});
}

document.getElementById('navToggle').addEventListener('click',()=>{
  document.getElementById('navLinks').classList.toggle('open');
});
document.querySelectorAll('#navLinks a').forEach(a=>a.addEventListener('click',()=>document.getElementById('navLinks').classList.remove('open')));
document.getElementById('year').textContent=new Date().getFullYear();
load();
</script>
